# .github/workflows/deploy.yml
#
# Triggered on every push to main.
# Zips the backend, uploads to S3, tells EC2 to deploy it.
# No SSH required — uses AWS SSM to run commands on EC2.
#
# Before this works, add these to GitHub repo Settings → Secrets:
#   AWS_ACCESS_KEY_ID      ← your AWS IAM user access key
#   AWS_SECRET_ACCESS_KEY  ← your AWS IAM user secret key
#   AWS_REGION             ← e.g. me-central-1
#   S3_BUCKET              ← from: terraform output artifact_bucket_name
#   ASG_NAME               ← secure-3tier-asg

name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # Zip the backend folder (excluding node_modules and .env)
      # and upload to the S3 artifact bucket
      - name: Upload app to S3
        run: |
          cd backend
          zip -r ../app.zip . --exclude "node_modules/*" --exclude ".env"
          aws s3 cp ../app.zip s3://${{ secrets.S3_BUCKET }}/app.zip
          echo "Uploaded app.zip to S3"

      # Get the IDs of running EC2 instances in the Auto Scaling Group
      - name: Get EC2 instance IDs
        id: instances
        run: |
          IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "${{ secrets.ASG_NAME }}" \
            --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId" \
            --output text)
          echo "ids=$IDS" >> $GITHUB_OUTPUT
          echo "Deploying to: $IDS"

      # Send a deploy command to EC2 via SSM (no SSH needed).
      # EC2 downloads the zip from S3, extracts it, installs
      # dependencies, and restarts the app using PM2.
      - name: Deploy to EC2
        run: |
          aws ssm send-command \
            --instance-ids ${{ steps.instances.outputs.ids }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "aws s3 cp s3://${{ secrets.S3_BUCKET }}/app.zip /tmp/app.zip",
              "unzip -o /tmp/app.zip -d /home/ec2-user/app",
              "cd /home/ec2-user/app && npm install --production",
              "chown -R ec2-user:ec2-user /home/ec2-user/app",
              "systemctl restart app",
              "sleep 5 && curl -f http://localhost:8080/health || exit 1"
            ]'
          echo "Deploy command sent. App will be live in ~30 seconds."
